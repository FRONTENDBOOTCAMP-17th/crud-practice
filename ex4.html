<!-- 9.2.4 POST 요청 예제 -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Fetch POST 요청</title>
    <style>
      .wrap {
        inline-size: 700px;
        display: flex;
        flex-direction: column;
      }
      textarea {
        resize: none;
        min-block-size: 400px;
      }
    </style>
  </head>
  <body>
    <h2>게시글 쓰기</h2>
    <p id="nickname"></p>

    <div class="wrap">
      <label for="title">제목:</label>
      <input type="text" id="title" />
      <label for="content">내용:</label>
      <textarea id="content"></textarea>
      <button id="postBtn">게시글 발행</button>
    </div>

    <pre id="result"></pre>
    <script>
      const url = new URL(window.location.href);
      const id = url.searchParams.get("id");
      const nicknameElement = document.getElementById("nickname");
      const nickname = localStorage.getItem("nickname");
      nicknameElement.textContent = `닉네임: ${nickname}`;

      document.getElementById("postBtn").addEventListener("click", async () => {
        const accessToken = localStorage.getItem("jwtToken");
        const title = document.getElementById("title").value;
        const content = document.getElementById("content").value;
        const result = document.getElementById("result");

        const postData = {
          title,
          content,
        };

        try {
          const res = await fetch(
            `https://api.fullstackfamily.com/api/edu/ws-dbd822/posts/${id}/publish`,
            {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + accessToken,
              },
              body: JSON.stringify(postData),
            },
          );

          if (!res.ok) {
            throw new Error("HTTP 오류: " + res.status);
          }

          window.location.replace("/ex.html");
        } catch (error) {
          result.textContent = "에러: " + error.message;
          result.style.color = "red";
        }
      });
    </script>
  </body>
</html>
