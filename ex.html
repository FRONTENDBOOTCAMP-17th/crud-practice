<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 20px;
      }
      .post {
        display: grid;
        grid-template-columns: subgrid;
        grid-column: 1 / span 5;
        border: 1px solid black;
        border-radius: 5px;
        padding: 10px 40px;
        font-size: 0.85rem;
        cursor: pointer;
        &:hover {
          background-color: #f1f1f1;
        }
      }
      .linkWrap {
        text-decoration: none;
        display: grid;
        grid-template-columns: subgrid;
        grid-column: 1 / span 5;
        color: black;
      }
      .pageHeader {
        grid-row: 1;
        grid-column: 1 / span 5;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <script></script>
  <body>
    <div class="pageHeader">
      <button id="postBtn">게시글 쓰기</button>
      <a href="/ex2.html">로그인 하러가기</a>
      <h2>게시글 목록</h2>
    </div>
    <pre id="result"></pre>
  </body>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch(
          "https://api.fullstackfamily.com/api/edu/ws-dbd822/posts",
          { method: "GET", headers: { "Content-Type": "application/json" } },
        );
        if (!res.ok) {
          throw new Error("HTTP 오류: " + res.status);
        }

        const { success, message, data } = await res.json();

        data.content.forEach((post) => {
          bakePostElement(post);
        });
      } catch (error) {
        result.textContent = "에러: " + error.message;
        result.style.color = "red";
      }
    });

    document.getElementById("postBtn").addEventListener("click", async () => {
      const accessToken = localStorage.getItem("jwtToken");
      if (accessToken === null) {
        window.location.replace("/ex2.html");
      }
      try {
        const res = await fetch(
          "https://api.fullstackfamily.com/api/edu/ws-dbd822/posts",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${accessToken}`,
            },
            body: {
              title: "새 게시글 제목",
              content: "게시글 내용을 작성합니다.",
            },
          },
        );

        if (!res.ok) {
          throw new Error("HTTP 오류: " + res.status);
        }

        const { success, message, data } = await res.json();
        window.location.href = `/ex4.html?id=${data.id}`;
      } catch (error) {
        result.textContent = "에러: " + error.message;
        result.style.color = "red";
      }
    });

    function bakePostElement(post) {
      const linkWrap = document.createElement("a");
      const postWrap = document.createElement("div");
      const postMain = document.createElement("div");
      const postDate = document.createElement("div");
      const postSub = document.createElement("div");
      const hiddenId = document.createElement("input");
      const authorNickname = document.createElement("p");
      const commentCount = document.createElement("p");
      const contentPreview = document.createElement("p");
      const createdAt = document.createElement("p");
      const postId = document.createElement("p");
      const publishedAt = document.createElement("p");
      const postTitle = document.createElement("p");
      const viewCount = document.createElement("p");

      postWrap.className = "post";
      postMain.className = "postMain";
      postDate.className = "postDate";
      postSub.className = "postSub";
      hiddenId.className = "hidden";
      linkWrap.href = `/ex5.html?id=${post.id}`;
      linkWrap.className = "linkWrap";

      authorNickname.textContent = "작성자: " + post.authorNickname;
      commentCount.textContent = "댓글: " + post.commentCount + "개";
      contentPreview.textContent = "내용 미리보기: " + post.contentPreview;
      createdAt.textContent = "생성일: " + post.createdAt;
      postId.textContent = "고유번호: " + post.id;
      hiddenId.value = post.id;
      publishedAt.textContent = "발행일: " + post.publishedAt;
      postTitle.textContent = "제목: " + post.title;
      viewCount.textContent = "조회 수: " + post.viewCount + "회";

      postMain.appendChild(postTitle);
      postMain.appendChild(contentPreview);
      postSub.appendChild(viewCount);
      postSub.appendChild(commentCount);
      postDate.appendChild(createdAt);
      postDate.appendChild(publishedAt);

      postWrap.appendChild(postId);
      postWrap.appendChild(postMain);
      postWrap.appendChild(authorNickname);
      postWrap.appendChild(postSub);
      postWrap.appendChild(postDate);
      postWrap.appendChild(hiddenId);
      linkWrap.appendChild(postWrap);
      document.body.appendChild(linkWrap);
    }
  </script>
</html>
