<!-- 9.2.4 POST 요청 예제 -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Fetch POST 요청</title>
  </head>
  <body>
    <h2>로그인</h2>
    <div
      style="
        display: flex;
        flex-direction: column;
        gap: 4px;
        inline-size: 150px;
      "
    >
      <input type="text" id="loginUsername" placeholder="아이디" />
      <input type="password" id="loginPassword" placeholder="비밀번호" />
    </div>
    <button id="loginBtn">로그인</button>
    <a href="/ex3.html">회원이 아니라면 회원가입을!!!</a>
    <pre id="loginResult"></pre>
    <script>
      document
        .getElementById("loginBtn")
        .addEventListener("click", async () => {
          const loginResult = document.getElementById("loginResult");
          const loginData = {
            username: document.getElementById("loginUsername").value,
            password: document.getElementById("loginPassword").value,
          };

          try {
            loginResult.textContent = "전송 중...";

            const res = await fetch(
              "https://api.fullstackfamily.com/api/edu/ws-dbd822/auth/login",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(loginData),
              },
            );

            if (!res.ok) {
              throw new Error("HTTP 오류: " + res.status);
            }

            const {
              data: { token, user },
            } = await res.json();
            console.log(user);
            localStorage.setItem("jwtToken", token);
            localStorage.setItem("nickname", user.nickname);
            window.location.replace("/ex.html");
          } catch (error) {
            loginResult.textContent = "에러: " + error.message;
            loginResult.style.color = "red";
          }
        });
    </script>
  </body>
</html>
