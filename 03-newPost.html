<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>글쓰기 폼 만들기</title>
  </head>
  <body>
    <div id="write_wrap">
      <div>
        이름 :
        <p id="nameInfo"></p>
      </div>
      <div>
        <label for="textTitle">제목</label>
        <input type="text" id="textTitle" placeholder="제목을 입력해주세요." />
      </div>
      <div>
        <label for="textMain">내용</label>
        <textarea
          name="main"
          id="textMain"
          placeholder="내용을 입력해주세요."
          rows="8"
        ></textarea>
      </div>
      <pre id="infoMessage"></pre>
    </div>

    <button type="submit" id="postBtn">글쓰기</button>

    <script>
      const apiMain = "https://api.fullstackfamily.com/api/edu/ws-7c1d4f";
      const nameInfo = document.getElementById("nameInfo");
      const infoMessage = document.getElementById("infoMessage");
      const writeWrap = document.getElementById("write_wrap");

      // 로그인 정보 확인 (닉네임 출력용)
      async function userInfo() {
        const token = localStorage.getItem("token");

        if (!token) {
          nameInfo.textContent =
            "게시글 작성을 위해 로그인을 먼저 해주시기를 바랍니다.";
          infoMessage.style.color = "red";
          return;
        }

        try {
          const res = await fetch(`${apiMain}/auth/me`, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
          });

          if (!res.ok) {
            throw new Error("인증 실패: " + res.status);
          }
          const data = await res.json();
          nameInfo.textContent = data.data.nickname;
        } catch (error) {
          infoMessage.textContent = "오류가 발생하였습니다 : " + error.message;
          infoMessage.style.color = "red";
        }
      }
      userInfo();

      // 새 게시글
      document.getElementById("postBtn").addEventListener("click", async () => {
        const token = localStorage.getItem("token");
        const title = document.getElementById("textTitle").value.trim();
        const content = document.getElementById("textMain").value.trim();

        if (!token) {
          infoMessage.textContent =
            "게시글 작성을 위해 로그인을 먼저 해주시기를 바랍니다.";
          return;
        }

        if (!title || !content) {
          infoMessage.textContent = "제목과 내용을 모두 입력해주세요.";
          return;
        }

        try {
          const draftRes = await fetch(`${apiMain}/posts`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ title, content }),
          });

          if (!draftRes.ok) throw new Error("글 저장 실패");

          const draftData = await draftRes.json();
          const postId = draftData.data.id;

          const publishRes = await fetch(`${apiMain}/posts/${postId}/publish`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ title, content }),
          });

          if (!publishRes.ok) throw new Error("발행 실패");

          alert("게시글이 등록되었습니다.");
          window.location.href = "list.html";
        } catch (error) {
          infoMessage.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
