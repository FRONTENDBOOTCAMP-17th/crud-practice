<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>내 정보 확인하기</title>
  </head>
  <body>
    <h2>내 정보 확인하기</h2>
    <pre id="infoResult"></pre>

    <script>
      async function loadMyInfo() {
        const infoResult = document.getElementById("infoResult");
        const accessToken = localStorage.getItem("token");

        try {
          const res = await fetch(
            "https://api.fullstackfamily.com/api/edu/ws-1c07e0/auth/me",
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + accessToken,
              },
            },
          );

          const { message, success, data } = await res.json();

          if (!res.ok) {
            throw new Error(
              "HTTP 오류: " +
                res.status +
                "\n\n success: " +
                success +
                "\n\n message: " +
                message,
            );
          }

          const { id, nickname, username } = data;
          infoResult.textContent =
            "내 정보 조회 성공!\n\nid: " +
            id +
            "\n\nusername: " +
            username +
            "\n\n닉네임: " +
            nickname;
          infoResult.style.color = "green";
        } catch (error) {
          infoResult.textContent = "에러: " + error.message;
          infoResult.style.color = "red";
        }
      }
      loadMyInfo();
    </script>
  </body>
</html>
