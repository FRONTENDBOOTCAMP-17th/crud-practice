<!-- 9.2.4 POST 요청 예제 -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Fetch POST 요청</title>
    <style>
      p {
        margin: 0;
      }
      #post {
        display: flex;
        flex-flow: column nowrap;
        padding-inline: 40px;
        gap: 10px;
      }
      .postTitle {
        margin: 0;
        padding-inline: 20px;
      }
      .postInfoWrap {
        display: flex;
        flex-flow: row nowrap;
        justify-content: space-between;
        border-top: 1px solid black;
        padding-block-start: 20px;
        padding-inline: 20px;
      }
      .countWrap {
        display: flex;
        flex-flow: row nowrap;
        gap: 20px;
      }
      .publishedAt {
        border-bottom: 1px solid black;
        padding-block-end: 20px;
        padding-inline: 20px;
      }
      .postContent {
        min-block-size: 400px;
        padding-block: 20px;
        padding-inline: 20px;
        background-color: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <h2>상세 게시글 보기</h2>
    <pre id="result"></pre>
    <script>
      const url = new URL(window.location.href);
      const id = url.searchParams.get("id");
      const accessToken = localStorage.getItem("jwtToken");

      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const res = await fetch(
            `https://api.fullstackfamily.com/api/edu/ws-dbd822/posts/${id}`,
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${accessToken}`,
              },
            },
          );

          if (!res.ok) {
            throw new Error("HTTP 오류: " + res.status);
          }

          const { success, message, data } = await res.json();
          console.log(data);

          BakePostScheme();
          BakePost(data);
        } catch (error) {
          result.textContent = "에러: " + error.message;
          result.style.color = "red";
        }
      });

      function BakePostScheme() {
        const post = document.createElement("div");
        post.id = "post";

        const title = document.createElement("h1");
        title.className = "postTitle";

        const postInfoWrap = document.createElement("div");
        postInfoWrap.className = "postInfoWrap";

        const author = document.createElement("p");
        author.className = "author";

        const publishedAt = document.createElement("p");
        publishedAt.className = "publishedAt";

        const horizontalLine = document.createElement("div");
        horizontalLine.className = "hLine";

        const content = document.createElement("p");
        content.className = "postContent";

        const commentCount = document.createElement("span");
        commentCount.className = "commentCount";
        const viewCount = document.createElement("span");
        viewCount.className = "viewCount";
        const countWrap = document.createElement("div");
        countWrap.className = "countWrap";

        countWrap.appendChild(commentCount);
        countWrap.appendChild(viewCount);

        postInfoWrap.appendChild(author);
        postInfoWrap.appendChild(countWrap);

        post.appendChild(title);
        post.appendChild(postInfoWrap);
        post.appendChild(publishedAt);
        post.appendChild(horizontalLine);
        post.appendChild(content);

        document.body.appendChild(post);
      }

      function BakePost(data) {
        const post = document.getElementById("post");
        console.log(post);
        const title = post.querySelector(".postTitle");
        title.textContent = data.title;
        const author = post.querySelector(".author");
        author.textContent = `작성자 : ${data.authorNickname}`;
        const publishedAt = post.querySelector(".publishedAt");
        publishedAt.textContent = `게시일 : ${data.publishedAt}`;
        const content = post.querySelector(".postContent");
        content.textContent = data.content;
        const viewCount = post.querySelector(".viewCount");
        viewCount.textContent = `조회수 : ${data.viewCount}`;
        const commentCount = post.querySelector(".commentCount");
        commentCount.textContent = `댓글 : ${data.commentCount}`;
      }
    </script>
  </body>
</html>
