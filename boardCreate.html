<!-- 9.2.4 POST 요청 예제 -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>게시판 - 글작성</title>
    <link rel="stylesheet" href="./css/boardCreate.css" />
  </head>
  <body>
    <h2>글쓰기</h2>
    <h3>작성자</h3>
    <input type="text" name="writer" id="writer" />

    <form>
      <h3>제목</h3>
      <input type="text" name="title" id="title" />
      <h3>내용</h3>
      <textarea name="content" id="content"></textarea>
      <br />
      <button type="reset" id="resetBtn">초기화</button>
      <button type="button" id="draftBtn">글쓰기</button>
    </form>
    <script>
      const writerInput = document.getElementById("writer");
      writerInput.readOnly = true;
      const token = localStorage.getItem("accessToken");

      async function fillUsername() {
        try {
          const res = await fetch(
            "https://api.fullstackfamily.com/api/edu/ws-0a7ef6/auth/me",
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
            },
          );

          if (!res.ok) throw new Error("사용자 정보 조회 실패");

          const data = await res.json();
          const nickname = data.data.nickname;

          writerInput.value = nickname;
        } catch (err) {
          writerInput.value = "사용자 정보 불러오기 실패";
          console.error(err);
        }
      }
      fillUsername();
      document
        .getElementById("draftBtn")
        .addEventListener("click", async () => {
          const post = {
            title: document.getElementById("title").value,
            content: document.getElementById("content").value,
          };

          try {
            const draftRes = await fetch(
              "https://api.fullstackfamily.com/api/edu/ws-0a7ef6/posts",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${token}`,
                },
                body: JSON.stringify(post),
              },
            );
            const draftData = await draftRes.json();

            if (!draftRes.ok) {
              throw new Error("임시저장실패: " + draftData.status);
            }

            const postId = draftData.data.id;
            console.log("생성된 ID:", postId);

            const publishRes = await fetch(
              `https://api.fullstackfamily.com/api/edu/ws-0a7ef6/posts/${postId}/publish`,
              {
                method: "PUT",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${token}`,
                },
                body: JSON.stringify(post),
              },
            );
            const publishData = await publishRes.json();

            if (!publishRes.ok) {
              throw new Error(`발행 실패: ${publishRes.status}`);
            }
            alert("발행완료!");
            setTimeout(() => {
              window.location.href = "boardList.html";
            }, 1000);
          } catch (error) {
            alert(error.message);
          }
        });
    </script>
  </body>
</html>
