<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>글쓰기</title>
    <style>
      body {
        padding: 20px;
        font-family: sans-serif;
        background: #f9f9f9;
      }
      .container {
        max-width: 800px;
        margin: auto;
      }
      .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .write-box {
        border: 1px solid #e1e4e8;
        padding: 24px;
        border-radius: 10px;
        background-color: #fff;
      }
      .author-info {
        font-size: 14px;
        color: #777;
        margin-bottom: 16px;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
        font-family: sans-serif;
      }
      textarea {
        min-height: 200px;
        resize: none;
      }
      .btn-submit {
        padding: 10px 20px;
        background: #000;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn-back {
        display: inline-block;
        padding: 10px 20px;
        background: #fff;
        color: #333;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        text-decoration: none;
      }
      #result {
        margin-top: 12px;
        font-size: 14px;
      }
    </style>
    <script>
      const token = localStorage.getItem("token");
      if (token == null) {
        alert("글쓰기를 하려면 로그인 해야합니다.");
        location.replace("index.html");
      }
    </script>
  </head>
  <body>
    <div class="container">
      <div class="header-flex">
        <h2>글쓰기</h2>
        <a href="index.html" class="btn-back">← 목록으로</a>
      </div>
      <div class="write-box">
        <p class="author-info" id="nickname"></p>
        <input type="text" id="title" placeholder="제목을 입력하세요" />
        <textarea id="content" placeholder="내용을 입력하세요"></textarea>
        <button class="btn-submit" id="submitBtn">게시글 발행</button>
        <p id="result"></p>
      </div>
    </div>

    <script>
      //const token = localStorage.getItem("token");
      const result = document.getElementById("result");
      // 내 정보 불러오기
      async function loadMyInfo() {
        try {
          const res = await fetch(
            "https://api.fullstackfamily.com/api/edu/ws-1c07e0/auth/me",
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token,
              },
            },
          );

          if (!res.ok) {
            throw new Error("내 정보 불러오기 실패 : " + res.status);
          }

          const { data } = await res.json();
          document.getElementById("nickname").textContent =
            "작성자: " + data.nickname;
        } catch (error) {
          console.error("에러:", error.message);
        }
      }

      // 게시글 발행
      document
        .getElementById("submitBtn")
        .addEventListener("click", async () => {
          const title = document.getElementById("title").value;
          const content = document.getElementById("content").value;

          if (!title || !content) {
            result.textContent = "제목과 내용을 입력해주세요.";
            result.style.color = "red";
            return;
          }

          if (!token) {
            result.textContent = "로그인이 필요합니다.";
            result.style.color = "red";
            return;
          }

          try {
            // 1단계: draft 생성
            const draft = await fetch(
              "https://api.fullstackfamily.com/api/edu/ws-1c07e0/posts",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: "Bearer " + token,
                },
                body: JSON.stringify({ title, content }),
              },
            );

            if (!draft.ok) {
              throw new Error("draft 오류: " + draft.status);
            }

            const draftData = await draft.json();
            const postId = draftData.data.id;

            // 2단계: publish
            const published = await fetch(
              `https://api.fullstackfamily.com/api/edu/ws-1c07e0/posts/${postId}/publish`,
              {
                method: "PUT",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: "Bearer " + token,
                },
                body: JSON.stringify({ title, content }),
              },
            );

            if (!published.ok) {
              throw new Error("publish 오류: " + published.status);
            }

            location.replace("./index.html");
          } catch (error) {
            result.textContent = "에러: " + error.message;
            result.style.color = "red";
          }
        });

      document.addEventListener("DOMContentLoaded", loadMyInfo);
    </script>
  </body>
</html>
