<!-- 9.2.4 POST 요청 예제 -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>게시글 상세</title>
    <link rel="stylesheet" href="./css/detail.css" />
  </head>
  <body>
    <div class="container">
      <div id="title" class="title">불러오는중...</div>
      <div id="info" class="info"></div>
      <div id="content" class="content"></div>

      <div class="buttons">
        <button type="button" class="list">목록</button>
        <button type="button" class="edit">수정</button>
        <button type="button" class="delete">삭제</button>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const postId = params.get("id");

      const title = document.getElementById("title");
      const info = document.getElementById("info");
      const content = document.getElementById("content");

      async function loadPost() {
        if (!postId) {
          titleEl.textContent = "잘못된 접근입니다.";
          return;
        }

        try {
          const res = await fetch(
            "https://api.fullstackfamily.com/api/edu/ws-0a7ef6/posts/" + postId,
          );

          if (!res.ok) {
            throw new Error("HTTP 오류: " + res.status);
          }

          const jsonObj = await res.json();
          const post = jsonObj.data;

          title.textContent = post.title;
          info.textContent =
            post.authorNickname +
            " | 조회 " +
            post.viewCount +
            " | 댓글 " +
            post.commentCount;
          content.textContent = post.content;
        } catch (error) {
          title.textContent = "에러 발생";
          content.textContent = error.message;
        }
      }

      loadPost(); // async 함수 호출
    </script>
  </body>
</html>
