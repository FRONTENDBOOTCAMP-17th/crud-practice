<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>게시글 상세</title>
    <style>
      body {
        padding: 20px;
        font-family: sans-serif;
        background: #f9f9f9;
      }
      .container {
        max-width: 800px;
        margin: auto;
      }
      .post-box {
        border: 1px solid #e1e4e8;
        padding: 24px;
        border-radius: 10px;
        background-color: #fff;
      }
      .post-title {
        font-size: 22px;
        font-weight: bold;
        color: #333;
        margin-bottom: 12px;
      }
      .post-meta {
        font-size: 13px;
        color: #777;
        display: flex;
        gap: 12px;
        margin-bottom: 8px;
      }
      .post-date {
        font-size: 12px;
        color: #999;
        margin-bottom: 20px;
      }
      .post-content {
        font-size: 15px;
        color: #333;
        line-height: 1.7;
        white-space: pre-wrap;
        border-top: 1px solid #e1e4e8;
        padding-top: 20px;
      }
      .btn-back {
        display: inline-block;
        margin-top: 24px;
        padding: 10px 20px;
        background: #000;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="post">
        <p>게시글을 불러오는 중입니다...</p>
      </div>
      <a href="index.html" class="btn-back">← 목록으로 돌아가기</a>
    </div>

    <script>
      const postEl = document.getElementById("post");
      const params = new URLSearchParams(window.location.search);
      const postId = params.get("id");

      async function loadPost() {
        if (!postId) {
          postEl.innerHTML = "<p>잘못된 접근입니다.</p>";
          return;
        }

        try {
          const res = await fetch(
            "https://api.fullstackfamily.com/api/edu/ws-1c07e0/posts/" + postId,
          );

          if (!res.ok) {
            throw new Error("HTTP 오류: " + res.status);
          }

          const resJson = await res.json();
          const post = resJson.data;
          const [date, time] = post.createdAt.split("T");

          postEl.innerHTML = `
            <div class="post-box">
              <div class="post-title">${post.title}</div>
              <div class="post-meta">
                <span>👤 ${post.authorNickname}</span>
                <span>👀 조회 ${post.viewCount}</span>
                <span>💬 댓글 ${post.commentCount}</span>
              </div>
              <div class="post-date">🕐 ${date} ${time}</div>
              <div class="post-content">${post.content}</div>
            </div>
          `;
        } catch (error) {
          postEl.innerHTML = "<p>에러: " + error.message + "</p>";
        }
      }

      document.addEventListener("DOMContentLoaded", loadPost);
    </script>
  </body>
</html>
