<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>게시판</title>
    <link rel="stylesheet" href="./css/boardList.css" />
  </head>
  <body>
    <div class="container">
      <div class="title">게시판</div>

      <ul id="boardList" class="boardList"></ul>
      <p id="message">불러오는 중...</p>

      <button class="writeBtn" id="writeBtn">글쓰기</button>
    </div>

    <script>
      const token = localStorage.getItem("accessToken");
      const message = document.getElementById("message");
      const boardList = document.getElementById("boardList");

      // 로그인 확인 후 글쓰기
      document.getElementById("writeBtn").addEventListener("click", () => {
        if (token) {
          window.location.href = "boardCreate.html";
        } else {
          alert("로그인 먼저 해주세요");
          window.location.href = "login.html";
        }
      });

      async function loadPosts() {
        try {
          const res = await fetch(
            "https://api.fullstackfamily.com/api/edu/ws-0a7ef6/posts",
          );

          if (!res.ok) {
            throw new Error("HTTP 오류: " + res.status);
          }

          const resJson = await res.json();
          const posts = resJson.data.content;

          if (posts.length === 0) {
            message.textContent = "게시글이 없습니다.";
            return;
          }

          message.textContent = "";

          for (let i = 0; i < posts.length; i++) {
            const post = posts[i];

            const li = document.createElement("li");

            const link = document.createElement("a");
            link.href = "detail.html?id=" + post.id;
            link.textContent = post.title;

            const info = document.createElement("div");
            info.textContent =
              post.authorNickname +
              " | 조회 " +
              post.viewCount +
              " | 댓글 " +
              post.commentCount;

            const preview = document.createElement("div");
            preview.textContent = post.contentPreview;

            li.appendChild(link);
            li.appendChild(info);
            li.appendChild(preview);
            boardList.appendChild(li);
          }
        } catch (error) {
          message.style.color = "red";
          message.textContent = "에러 발생: " + error.message;
        }
      }

      loadPosts();
    </script>
  </body>
</html>
